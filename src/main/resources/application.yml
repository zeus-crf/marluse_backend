server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: marluse-backend

  datasource:
    url: jdbc:mysql://localhost:3306/marluse?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false   # desligado em dev — Flyway só roda no perfil docker

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

security:
  jwt:
    secret: ${JWT_SECRET:}
    access-expiration: 900000
    refresh-expiration: 604800000
  cookie:
    secure: false

app:
  cors:
    allowed-origin: http://localhost:4200
  admin:
    email: ${ADMIN_EMAIL:admin@marluse.com}
    senha: ${ADMIN_SENHA:admin123}

logging:
  level:
    com.marluse: DEBUG