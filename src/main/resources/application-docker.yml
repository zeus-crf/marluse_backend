spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # não executa V1 se o banco já existir
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate         # Hibernate só valida — Flyway que migra
    show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  cookie:
    secure: true   # HTTPS obrigatório em produção

app:
  admin:
    email: ${ADMIN_EMAIL}
    senha: ${ADMIN_SENHA}

logging:
  level:
    com.marluse: WARN
