spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # não executa V1 se o banco já existir
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate         # Hibernate só valida — Flyway que migra
    show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  cookie:
    secure: true   # HTTPS obrigatório em produção

app:
  cors:
    allowed-origin: ${CORS_ORIGIN}
  admin:
    email: ${ADMIN_EMAIL}
    senha: ${ADMIN_SENHA}

logging:
  level:
    com.marluse: WARN
