spring:
  datasource:
    url: jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    # password NÃO está aqui — vem via -Dspring.datasource.password=$MYSQLPASSWORD no Dockerfile
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0   # 0 = roda V1, V2, etc. em banco novo

  jpa:
    hibernate:
      ddl-auto: validate         # Hibernate só valida — Flyway que migra
    show-sql: false

security:
  jwt:
    secret: ${JWT_SECRET}          # resolvido via -DJWT_SECRET=$JWT_SECRET no Dockerfile
    access-expiration: 900000      # 15 min (access token)
    refresh-expiration: 604800000  # 7 dias (refresh token)
  cookie:
    secure: true   # HTTPS obrigatório em produção

app:
  cors:
    allowed-origin: ${CORS_ORIGIN}   # resolvido via -DCORS_ORIGIN=$CORS_ORIGIN no Dockerfile
  admin:
    email: ${ADMIN_EMAIL}             # resolvido via -DADMIN_EMAIL=$ADMIN_EMAIL no Dockerfile
    senha: ${ADMIN_SENHA}             # resolvido via -DADMIN_SENHA=$ADMIN_SENHA no Dockerfile

logging:
  level:
    com.marluse: WARN
    com.zaxxer.hikari: DEBUG      # temporário — mostra erro real de conexão
    org.flywaydb: DEBUG           # temporário — mostra erro de migration
